services:
  mariadb:
    image: mariadb:11.3
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: greenhash
      MARIADB_USER: greenhash
      MARIADB_PASSWORD: greenhash
    ports:
      - "3306:3306"
    volumes:
      - ../Backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: ../Backend
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: 1
      SECRET_KEY: "dev-secret-key"
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: greenhash
      DB_PASSWORD: greenhash
      DB_NAME: greenhash
    ports:
      - "5000:5000"
    volumes:
      - ../Backend:/backend
    depends_on:
      mariadb:
        condition: service_healthy
  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: mariadb
      PMA_USER: greenhash
      PMA_PASSWORD: greenhash
    ports:
      - "8080:80"
    depends_on:
      - mariadb
