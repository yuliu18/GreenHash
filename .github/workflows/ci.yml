name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ============================================================
  # ANÁLISIS DE SEGURIDAD ESTÁTICO (SAST) — Gate de seguridad
  # ============================================================
  # Ejecuta Bandit sobre el código fuente en cada Pull Request.
  # El build FALLA (rojo) únicamente si encuentra vulnerabilidades
  # de severidad Media o Alta. Los hallazgos de severidad Baja se
  # reportan en el log pero no bloquean la integración.
  #
  # Nota: las pruebas unitarias (pytest) se ejecutan de forma local
  # durante el desarrollo (ver Documentacion/FLUJO_DE_TRABAJO.md).
  # Bajo Strict TDD, 8 stubs están intencionalmente en estado RED,
  # por lo que el gate de calidad automatizado es el análisis SAST.
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Instalar Bandit
      run: |
        python -m pip install --upgrade pip
        pip install bandit==1.7.9

    - name: Reporte completo SAST (informativo — todas las severidades)
      working-directory: App/Backend
      run: bandit -r app || true

    - name: Gate de seguridad SAST (bloquea ante Medium/High)
      working-directory: App/Backend
      run: bandit -r app --severity-level medium --confidence-level medium
